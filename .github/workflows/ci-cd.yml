name: CI/CD - Threat Detection Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  AWS_REGION: us-east-1

jobs:
  
  # JOB 1: Lint & Static Analysis
  
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Flake8 lint
        run: flake8 src/ --max-line-length=120 --ignore=E203,W503

      - name: Black format check
        run: black --check src/ tests/

      - name: Bandit security scan
        run: bandit -r src/ -ll -ii

  # JOB 2: Unit Tests
  
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v
        env:
          PYTHONPATH: src

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: coverage.xml

  # JOB 3: Validate CloudFormation

  validate-cfn:
    name: Validate CloudFormation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate CloudFormation template
        run: |
          aws cloudformation validate-template \
            --template-body file://infrastructure/cloudformation/threat-detection-stack.yaml
 
  # JOB 4: Build and Package Lambda
 
  build:
    name: Build Lambda Package
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install production dependencies
        run: |
          pip install boto3 botocore --target ./package
          cp -r src/* ./package/

      - name: Create Lambda zip
        run: |
          cd package
          zip -r ../lambda-threat-detection.zip .
          cd ..
          echo "Package size: $(du -sh lambda-threat-detection.zip)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-package
          path: lambda-threat-detection.zip
          retention-days: 30

  # JOB 5: Deploy to Staging (on main branch)

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, validate-cfn]
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download Lambda artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-package

      - name: Upload Lambda to S3
        run: |
          aws s3 cp lambda-threat-detection.zip \
            s3://${{ secrets.LAMBDA_CODE_BUCKET }}/lambda/threat-detection.zip

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/cloudformation/threat-detection-stack.yaml \
            --stack-name cloud-threat-detection-staging \
            --parameter-overrides \
              Environment=staging \
              AlertEmailAddress=${{ secrets.ALERT_EMAIL }} \
              LambdaCodeBucket=${{ secrets.LAMBDA_CODE_BUCKET }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name cloud-threat-detection-staging \
            --s3-bucket ${{ secrets.LAMBDA_CODE_BUCKET }} \
            --s3-key lambda/threat-detection.zip